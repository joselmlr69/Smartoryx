<div class="container">
  <div class="card">
    <h2>Editar Producto</h2>

    <form (ngSubmit)="actualizar()">

      <div class="form-group">
        <label>Nombre</label>
        <input type="text" [(ngModel)]="producto.nombre" name="nombre">
      </div>

      <div class="form-group">
        <label>Descripción</label>
        <input type="text" [(ngModel)]="producto.descripcion" name="descripcion">
      </div>

      <div class="form-group">
        <label>Precio</label>
        <input type="number" [(ngModel)]="producto.precio" name="precio">
      </div>

      <div class="form-group">
        <label>Stock</label>
        <input type="number" [(ngModel)]="producto.stock" name="stock">
      </div>

      <div class="form-group">
        <label>Categoría</label>
        <select [(ngModel)]="producto.idCategoria" name="idCategoria">
          <option [ngValue]="null" disabled>Seleccione categoría</option>
          <option *ngFor="let c of categorias" [ngValue]="c.id">
            {{ c.nombre }}
          </option>
        </select>
      </div>

      <div class="form-group">
        <label>Marca</label>
        <select [(ngModel)]="producto.idMarca" name="idMarca">
          <option [ngValue]="null" disabled>Seleccione marca</option>
          <option *ngFor="let m of marcas" [ngValue]="m.id">
            {{ m.nombre }}
          </option>
        </select>
      </div>

      <div class="form-group">
        <label>Proveedor</label>
        <select [(ngModel)]="producto.idProveedor" name="idProveedor">
          <option [ngValue]="null" disabled>Seleccione proveedor</option>
          <option *ngFor="let p of proveedores" [ngValue]="p.id">
            {{ p.nombre }}
          </option>
        </select>
      </div>

      <div class="form-group">
        <label>Estado</label>
        <select [(ngModel)]="producto.estado" name="estado">
          <option [ngValue]="null" disabled>Seleccione Estado</option>
          <option [ngValue]="1">Activo</option>
          <option [ngValue]="0">Inactivo</option>
        </select>
      </div>

      <div class="buttons">
        <button class="btn guardar" type="submit">Actualizar</button>
        <button class="btn volver" type="button" routerLink="/productos">Volver</button>
      </div>

    </form>
  </div>
</div>
