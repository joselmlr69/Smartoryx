<div class="container">
  <div class="card">

    <h2>Registrar Usuario</h2>

    <div class="form-group">
      <label>Nombre</label>
      <input type="text" [(ngModel)]="nuevoUsuario.nombre" />
    </div>

    <div class="form-group">
      <label>Apellido</label>
      <input type="text" [(ngModel)]="nuevoUsuario.apellido" />
    </div>

    <div class="form-group">
      <label>Correo</label>
      <input type="email" [(ngModel)]="nuevoUsuario.correo" />
    </div>

    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" [(ngModel)]="nuevoUsuario.password" />
    </div>

    <div class="form-group">
      <label>Rol</label>
      <select [(ngModel)]="nuevoUsuario.rol.id">
        <option [ngValue]="null" disabled>Seleccione rol</option>

        <option *ngFor="let r of roles" [ngValue]="r.id">
          {{ r.descripcion }}
        </option>
      </select>
    </div>

    <div class="buttons">
      <button class="btn guardar" (click)="guardar()">Guardar</button>
      <button class="btn volver" routerLink="/usuarios">Volver</button>
    </div>

  </div>
</div>
