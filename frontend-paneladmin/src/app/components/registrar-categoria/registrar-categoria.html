<div class="container">
  <div class="card">

    <h2>Registrar Categoría</h2>

    <div class="form-group">
      <label>Nombre</label>
      <input [(ngModel)]="categoria.nombre" type="text">
    </div>

    <div class="buttons">
      <button class="btn guardar" (click)="guardar()">
        Guardar
      </button>

      <button class="btn eliminar" routerLink="/categorias">
        Cancelar
      </button>
    </div>

  </div>
</div>
