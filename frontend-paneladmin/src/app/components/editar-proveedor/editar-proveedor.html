<div class="container">
  <div class="card">
    <h2>Editar Proveedor</h2>

    <form (ngSubmit)="actualizar()">

      <div class="form-group">
        <label>Nombre</label>
        <input type="text" [(ngModel)]="proveedor.nombre" name="nombre">
      </div>

      <div class="form-group">
        <label>RUC</label>
        <input type="text" [(ngModel)]="proveedor.ruc" name="ruc">
      </div>

      <div class="form-group">
        <label>Teléfono</label>
        <input type="text" [(ngModel)]="proveedor.telefono" name="telefono">
      </div>

      <div class="buttons">
        <button class="btn guardar" type="submit">Actualizar</button>
        <button class="btn volver" type="button" routerLink="/proveedores">Volver</button>
      </div>

    </form>
  </div>
</div>
