<div class="container">
  <div class="card">
    <h2>Registrar Dirección</h2>

    <div class="form-group">
      <label>Usuario</label>
      <select [(ngModel)]="id_usuario">
        <option [ngValue]="0" disabled>Seleccione usuario</option>

        <option *ngFor="let u of usuarios" [ngValue]="u.id_usuario">
          {{ u.nombre }} {{ u.apellido }}
        </option>
      </select>
    </div>

    <div class="form-group">
      <label>Dirección</label>
      <input type="text" [(ngModel)]="nuevaDireccion.direccion" />
    </div>

    <div class="form-group">
      <label>Ciudad</label>
      <input type="text" [(ngModel)]="nuevaDireccion.ciudad" />
    </div>

    <div class="form-group">
      <label>Referencia</label>
      <input type="text" [(ngModel)]="nuevaDireccion.referencia" />
    </div>

    <div class="buttons">
      <button class="btn guardar" (click)="guardar()">Guardar</button>
      <button class="btn volver" routerLink="/direcciones">Volver</button>
    </div>

  </div>
</div>
